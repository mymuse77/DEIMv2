task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 4
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: D:\AI\Datasets\Dataset of Personal Protective Equipment (PPE)\20250731-ppe2286y\train\images
    ann_file: D:\AI\Datasets\Dataset of Personal Protective Equipment (PPE)\20250731-ppe2286y\train\_annotations.coco.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
           probability: 1.0, fill_value: 0, use_cache: True, max_cached_images: 20, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 12}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 12}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        name: stop_epoch
        epoch: [4, 27, 42]
        ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
      mosaic_prob: 0.3
  shuffle: True
  num_workers: 2
  drop_last: True
  total_batch_size: 4
  collate_fn:
    type: BatchImageCollateFunction
    mixup_prob: 0.0
    mixup_epochs: [4, 27]
    copyblend_prob: 0.0
    copyblend_epochs: [4, 42]
    stop_epoch: 42
    ema_restart_decay: 0.9999
    base_size: 640
    base_size_repeat: ~

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: D:\AI\Datasets\Dataset of Personal Protective Equipment (PPE)\20250731-ppe2286y\valid\images
    ann_file: D:\AI\Datasets\Dataset of Personal Protective Equipment (PPE)\20250731-ppe2286y\valid\_annotations.coco.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
  shuffle: False
  num_workers: 2
  drop_last: False
  total_batch_size: 4
  collate_fn:
    type: BatchImageCollateFunction
