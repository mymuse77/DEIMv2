# DEIMv2 HGNetv2-X (B5) - 4090 GPU优化配置
# 用于PPE数据集（安全帽+反光衣检测）

__include__:
  - '../dataset/ppe_detection.yml'
  - '../runtime.yml'
  - '../base/deimv2.yml'

output_dir: ./outputs/deimv2_hgnetv2_x_ppe

# 预训练权重路径（COCO预训练）
pretrained_weights: D:/AI/Datasets/DEIMv2_models/deim_dfine_hgnetv2_x_coco_50e.pth

DEIM:
  encoder: HybridEncoder

# HGNetv2 B5配置（最大模型）
HGNetv2:
  name: 'B5'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_stem_only: True
  freeze_norm: False
  pretrained: True
  local_model_dir: './weight/hgnetv2/'
  use_lab: True

# B5对应的Encoder配置
HybridEncoder:
  in_channels: [512, 1024, 2048]
  feat_strides: [8, 16, 32]
  hidden_dim: 384
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 2048
  dropout: 0.0
  enc_act: 'gelu'
  expansion: 1.0
  depth_mult: 1.0
  act: 'silu'
  version: 'deim'
  csp_type: 'csp2'
  fuse_op: 'sum'

# B5对应的Decoder配置
DEIMTransformer:
  feat_channels: [384, 384, 384]
  feat_strides: [8, 16, 32]
  hidden_dim: 384
  num_levels: 3
  num_layers: 6
  eval_idx: -1
  num_queries: 300
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  reg_max: 32
  reg_scale: 8
  layer_scale: 1
  num_points: [3, 6, 3]
  cross_attn_method: 'default'
  query_select_method: 'default'
  activation: 'silu'
  mlp_act: 'silu'
  dim_feedforward: 2048
  eval_spatial_size: [640, 640]

PostProcessor:
  num_top_queries: 300

# 4090 GPU优化配置
optimizer:
  type: AdamW
  params:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.00001  # 使用预训练权重，降低backbone学习率
    - params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.00001
      weight_decay: 0.
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.
  lr: 0.0002  # 微调学习率
  betas: [0.9, 0.999]
  weight_decay: 0.0001

# 训练周期（使用预训练可以缩短）
epoches: 72
flat_epoch: 36
no_aug_epoch: 8

# 4090 GPU优化：更大batch size
train_dataloader:
  dataset:
    transforms:
      policy:
        epoch: [4, 36, 64]
  batch_size: 8  # 4090可支持更大batch
  num_workers: 8  # 更多数据加载线程
  collate_fn:
    ema_restart_decay: 0.9998
    base_size_repeat: 3
    stop_epoch: 64

val_dataloader:
  batch_size: 8
  num_workers: 8

eval_spatial_size: [640, 640]

DEIMCriterion:
  weight_dict: {loss_mal: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5}
  losses: ['mal', 'boxes', 'local']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32
  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 50
