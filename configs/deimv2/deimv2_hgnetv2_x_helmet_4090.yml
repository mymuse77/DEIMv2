__include__:
  - '../dataset/helmet_detection2_gpu.yml'
  - '../runtime.yml'
  - '../base/deimv2.yml'

output_dir: ./outputs/deimv2_hgnetv2_x_helmet_4090

DEIM:
  encoder: HybridEncoder

HGNetv2:
  name: 'B5'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_stem_only: True
  freeze_norm: False
  pretrained: True
  local_model_dir: './weight/hgnetv2/'
  use_lab: True

HybridEncoder:
  in_channels: [512, 1024, 2048]
  feat_strides: [8, 16, 32]
  hidden_dim: 384
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 2048
  dropout: 0.0
  enc_act: 'gelu'
  expansion: 1.0
  depth_mult: 1.0
  act: 'silu'
  version: 'deim'
  csp_type: 'csp2'
  fuse_op: 'sum'

DEIMTransformer:
  feat_channels: [384, 384, 384]
  feat_strides: [8, 16, 32]
  hidden_dim: 384
  num_levels: 3
  num_layers: 6
  eval_idx: -1
  num_queries: 300
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  reg_max: 32
  reg_scale: 8
  layer_scale: 1
  num_points: [3, 6, 3]
  cross_attn_method: 'default'
  query_select_method: 'default'
  activation: 'silu'
  mlp_act: 'silu'
  dim_feedforward: 2048
  eval_spatial_size: [640, 640]

PostProcessor:
  num_top_queries: 300

use_amp: True
scaler:
  type: GradScaler
  enabled: True

use_ema: True
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 2000

optimizer:
  type: AdamW
  params:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.00001  
    - params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.00001
      weight_decay: 0.
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.
  lr: 0.0002  
  betas: [0.9, 0.999]
  weight_decay: 0.0001

epoches: 72
flat_epoch: 36
no_aug_epoch: 8

eval_spatial_size: [640, 640]

DEIMCriterion:
  weight_dict: {loss_mal: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5}
  losses: ['mal', 'boxes', 'local']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32
  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 50
